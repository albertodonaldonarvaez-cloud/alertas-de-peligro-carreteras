version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: alertas_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: alertas_carreteras
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secret_2024
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d alertas_carreteras"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: alertas_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: alertas_carreteras
      DB_USER: postgres
      DB_PASSWORD: postgres_secret_2024
      PORT: 3000
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads_data:
